<mat-toolbar color="primary" fxLayout="row" fxLayoutAlign="space-between center" color="accent">

    <div fxFlex fxLayout="row" fxLayoutAlign="start center">

        <app-logo></app-logo>
        <span class="tournament-name text-white">{{ accountService.companyName }}</span>

    </div>
    <button mat-button [matMenuTriggerFor]="menu">
        Menú
    </button>
    <mat-menu #menu="matMenu">
        <button mat-menu-item routerLink="/">Página principal</button>
        <button mat-menu-item routerLink="matches/lineup">Subir alineación</button>
        <button mat-menu-item routerLink="my-team">
            <mat-icon>groups</mat-icon>
            Mi Equipo
        </button>
    </mat-menu>

</mat-toolbar>
